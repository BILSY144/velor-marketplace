name: Publish Velor app to Expo
on:
  workflow_dispatch:
  push:
    branches: [mobile-app]
    paths: ["mobile/**"]
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Publish EAS Update
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli update --branch preview --message "Publish from GitHub Actions" --non-interactive
